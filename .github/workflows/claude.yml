name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: ${{ github.event.issue.pull_request && format('refs/pull/{0}/head', github.event.issue.number) || github.ref }}

      # Workaround: pre-install a known-good Claude Code CLI version to avoid
      # the depsCount AJV bug in @anthropic-ai/claude-agent-sdk (v0.2.27+).
      # See: https://github.com/anthropics/claude-code-action/issues/852
      - name: Install Claude Code CLI
        run: |
          sudo rm -f /usr/local/bin/claude
          npm install -g @anthropic-ai/claude-code@2.1.18
          echo "CLAUDE_PATH=$(which claude)" >> $GITHUB_ENV

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--model claude-3-haiku-20240307 --allowedTools 'Bash(cd:*)' 'Bash(git:*)' 'Bash(make:*)' 'Bash(npm:*)' 'Bash(go:*)'"
          path_to_claude_code_executable: ${{ env.CLAUDE_PATH }}
          show_full_output: true
