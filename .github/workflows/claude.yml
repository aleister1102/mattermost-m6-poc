name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: ${{ github.event.issue.pull_request && format('refs/pull/{0}/head', github.event.issue.number) || github.ref }}

      # NOTE: The original Mattermost workflow uses anthropics/claude-code-action@v1.0.70
      # which has a known SDK bug (depsCount AJV validation error).
      # We call the Claude Code CLI directly as a workaround.
      # This is functionally equivalent -- the action internally invokes the same CLI.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Run Claude Code
        id: claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          COMMENT_BODY=$(jq -r '.comment.body // .issue.body // .review.body // empty' "$GITHUB_EVENT_PATH")
          echo "Running Claude with user comment..."
          claude -p "$COMMENT_BODY" \
            --allowedTools "Bash(cd:*)" "Bash(git:*)" "Bash(make:*)" "Bash(npm:*)" "Bash(go:*)" \
            --dangerously-skip-permissions \
            --model claude-haiku-4-5 \
            --verbose 2>&1 | tee /tmp/claude-output.txt || true
