name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Important for Claude to see the code
          fetch-depth: 1
          # Crucial: Checkout the code from the PR that triggered the comment, not just main
          ref: ${{ github.event.issue.pull_request && format('refs/pull/{0}/head', github.event.issue.number) || github.ref }}

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1.0.70
        with:
          # In a real environment, this is a secret.
          # For the PoC, we map a dummy secret or just an echo secret.
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY || 'sk-ant-dummy-secret-12345' }}
          model: claude-3-7-sonnet-20250219
          allowed_tools: "Bash(cd:*),Bash(git:*),Bash(make:*),Bash(npm:*),Bash(go:*)"
