name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: ${{ github.event.issue.pull_request && format('refs/pull/{0}/head', github.event.issue.number) || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Run Claude Code
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          COMMENT_BODY=$(jq -r '.comment.body' "$GITHUB_EVENT_PATH")
          echo "Comment: $COMMENT_BODY"
          claude -p "$COMMENT_BODY" \
            --allowedTools "Bash(make:*)" "Bash(cd:*)" "Bash(git:*)" "Bash(npm:*)" "Bash(go:*)" \
            --dangerously-skip-permissions \
            --model claude-sonnet-4-6 \
            --verbose 2>&1 | tee /tmp/claude-output.txt || true

      - name: Post response as PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let output = 'No output captured.';
            try {
              output = fs.readFileSync('/tmp/claude-output.txt', 'utf8');
            } catch (e) {}
            if (output.length > 60000) {
              output = output.substring(0, 60000) + '\n\n... (truncated)';
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `### Claude Code Response\n\n\`\`\`\n${output}\n\`\`\``
            });
